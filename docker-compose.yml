services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: byhormiga-db
    environment:
      POSTGRES_DB: byhormiga
      POSTGRES_USER: byhormiga
      POSTGRES_PASSWORD: byhormiga_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byhormiga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byhormiga-network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: byhormiga-backend
    command: >
      sh -c "uv run --no-sync python manage.py migrate --no-input &&
             uv run --no-sync python manage.py collectstatic --no-input &&
             uv run --no-sync python manage.py runserver 0.0.0.0:8000"
    environment:
      # Django settings
      SECRET_KEY: django-insecure-dev-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend

      # Database
      DATABASE_URL: postgresql://byhormiga:byhormiga_dev_password@db:5432/byhormiga

      # Cloudinary (agregar tus credenciales)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/.venv
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - byhormiga-network

networks:
  byhormiga-network:
    driver: bridge

volumes:
  postgres_data:
  backend_static:
  backend_media:
