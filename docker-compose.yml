services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: byhormiga-db
    environment:
      POSTGRES_DB: byhormiga
      POSTGRES_USER: byhormiga
      POSTGRES_PASSWORD: byhormiga_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byhormiga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byhormiga-network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: byhormiga-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byhormiga-network

  # Bootstrap development bucket in MinIO
  minio-init:
    image: minio/mc:latest
    container_name: byhormiga-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/byhormiga-dev || true &&
      mc anonymous set private local/byhormiga-dev
      "
    restart: "no"
    networks:
      - byhormiga-network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: byhormiga-backend
    command: >
      sh -c "uv run --no-sync python manage.py migrate --no-input &&
             uv run --no-sync python manage.py collectstatic --no-input &&
             uv run --no-sync python manage.py runserver 0.0.0.0:8000"
    environment:
      # Django settings
      SECRET_KEY: django-insecure-dev-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend

      # Database
      DATABASE_URL: postgresql://byhormiga:byhormiga_dev_password@db:5432/byhormiga

      # S3-compatible bucket (MinIO for local development)
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-byhormiga-dev}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}

      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/.venv
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - byhormiga-network

networks:
  byhormiga-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  backend_static:
  backend_media:
